<!DOCTYPE html>
<html>
<head>
    <title>Core Platform Test Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border: 1px solid #e0e0e0; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 40px; }
        h3 { margin-top: 0; color: #5f6368; border-bottom: 2px solid #f1f3f4; padding-bottom: 10px; }
        button { padding: 12px 24px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        button.secondary { background: #f1f3f4; color: #3c4043; margin-left: 10px; }
        pre { background: #202124; color: #e8eaed; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
        input { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; width: 250px; margin-right: 10px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 14px; margin-top: 10px; }
        .status-online { background: #e6f4ea; color: #137333; }
        .status-offline { background: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Core Platform Test Dashboard</h1>

        <div class="card">
            <h3>Step 1: Authentication (Google)</h3>
            <button onclick="signInWithGoogle()">Google 로그인</button>
            <button class="secondary" onclick="signOut()">로그아웃</button>
            <div id="auth-status" class="status-badge status-offline">상태: 체크 중...</div>
        </div>

        <div class="card">
            <h3>Step 2: API Token (JWT)</h3>
            <p style="font-size: 14px; color: #70757a;">서버 API 호출 시 Authorization 헤더에 사용됩니다.</p>
            <pre id="token-display">로그인하면 여기에 JWT 토큰이 표시됩니다.</pre>
        </div>

        <div class="card">
            <h3>Step 3: Backend API Call (/auth/me)</h3>
            <div style="margin-bottom: 15px;">
                <input type="text" id="project-id" placeholder="x-project-id 입력" value="test-project-001">
                <button onclick="callBackendMe()">내 정보 가져오기</button>
            </div>
            <pre id="api-result">API 호출 결과가 여기에 표시됩니다.</pre>
        </div>
    </div>

    <script>
        // 서버에서 주입된 환경변수
        const SUPABASE_URL = "{{ supabase_url }}";
        const SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function signInWithGoogle() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    redirectTo: window.location.origin + "/test" 
                }
            });
            if (error) console.error("Login Error:", error.message);
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // 인증 상태 변경 감지
        supabaseClient.auth.onAuthStateChange((event, session) => {
            const statusBadge = document.getElementById('auth-status');
            if (session) {
                statusBadge.innerText = "상태: 로그인됨 (" + session.user.email + ")";
                statusBadge.className = "status-badge status-online";
                document.getElementById('token-display').innerText = session.access_token;
            } else {
                statusBadge.innerText = "상태: 로그아웃됨";
                statusBadge.className = "status-badge status-offline";
                document.getElementById('token-display').innerText = "로그인이 필요합니다.";
            }
        });

        async function callBackendMe() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const projectId = document.getElementById('project-id').value;

            if (!session) {
                alert("먼저 로그인해주세요!");
                return;
            }

            document.getElementById('api-result').innerText = "호출 중...";

            try {
                const response = await fetch("/api/v1/auth/me", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${session.access_token}`,
                        "x-project-id": projectId
                    }
                });
                const result = await response.json();
                document.getElementById('api-result').innerText = JSON.stringify(result, null, 2);
            } catch (err) {
                document.getElementById('api-result').innerText = "통신 에러: " + err.message;
            }
        }
    </script>
</body>
</html>
