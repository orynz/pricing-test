name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
    - name: Set up Python
      run: uv python install
      
    - name: Install dependencies
      run: uv sync
      
    - name: Run lint (optional)
      run: |
        # uv add ruff --dev
        # uv run ruff check .
        echo "Linting placeholder"
