services:
  db:
    image: postgres:15-alpine
    container_name: core-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: core-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
